[tools]
k3d = "latest"
k9s = "latest"
kubectl = "latest"
pre-commit = "latest"
python = "3.13"
ruff = "0.15.8"
trivy = "0.69.2"
uv = "latest"

[settings]
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[env]
APP_REPO = 'devops-study-app'
GITOPS_REPO = 'devops-study-app-gitops'

[hooks]
enter = "bash ./scripts/setup_project"

[tasks.k8s-setup-local]
description = "Set up a basic Kubernetes cluster for development that builds the local images and applies them"
run = "bash ./kubernetes/setup-cluster-local"


[tasks.k8s-setup-minimal]
description = "Set up a basic Kubernetes cluster local"
run = "bash ./kubernetes/setup-cluster-minimal"

[tasks.e2e-test]
description = "Run end to end test with Python with Kubernetes deployment"
run = "cd ./kubernetes/ && uv run e2e_test.py"
